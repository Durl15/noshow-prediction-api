<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-Show Prediction Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result.high {
            background: #fee;
            border-left: 4px solid #e74c3c;
        }
        
        .result.medium {
            background: #fff3cd;
            border-left: 4px solid #f39c12;
        }
        
        .result.low {
            background: #d4edda;
            border-left: 4px solid #27ae60;
        }
        
        .risk-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        
        .risk-badge.high {
            background: #e74c3c;
            color: white;
        }
        
        .risk-badge.medium {
            background: #f39c12;
            color: white;
        }
        
        .risk-badge.low {
            background: #27ae60;
            color: white;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 5px;
        }
        
        .metric-label {
            font-weight: 600;
            color: #555;
        }
        
        .metric-value {
            font-weight: bold;
            color: #333;
        }
        
        .probability-circle {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            position: relative;
        }
        
        .probability-circle svg {
            transform: rotate(-90deg);
        }
        
        .probability-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            font-weight: bold;
        }
        
        .history {
            margin-top: 20px;
        }
        
        .history-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .api-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .api-status.online {
            background: #27ae60;
            color: white;
        }
        
        .api-status.offline {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="api-status offline" id="apiStatus">Checking API...</div>
    
    <div class="container">
        <header>
            <h1>?? No-Show Prediction Dashboard</h1>
            <p class="subtitle">ML-Powered Appointment Risk Assessment</p>
        </header>
        
        <div class="grid">
            <div class="card">
                <h2>?? Patient Information</h2>
                <form id="predictionForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="patient@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="appointmentDate">Appointment Date</label>
                        <input type="date" id="appointmentDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="appointmentValue">Appointment Value ($)</label>
                        <input type="number" id="appointmentValue" value="150" min="0" step="10">
                    </div>
                    
                    <div class="form-group">
                        <label for="isNewPatient">New Patient?</label>
                        <select id="isNewPatient">
                            <option value="false">No - Returning Patient</option>
                            <option value="true">Yes - New Patient</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="previousNoShows">Previous No-Shows</label>
                        <input type="number" id="previousNoShows" value="0" min="0" max="10">
                    </div>
                    
                    <div class="form-group">
                        <label for="leadTime">Lead Time (Days)</label>
                        <input type="number" id="leadTime" value="14" min="1" max="90">
                    </div>
                    
                    <button type="submit" id="submitBtn">?? Predict No-Show Risk</button>
                </form>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Analyzing risk factors...</p>
                </div>
            </div>
            
            <div class="card">
                <h2>?? Prediction Result</h2>
                <div id="resultContainer">
                    <p style="text-align: center; color: #999; margin-top: 50px;">
                        Enter patient information and click "Predict" to see results
                    </p>
                </div>
            </div>
        </div>
        
        <div class="card history">
            <h2>?? Recent Predictions</h2>
            <div id="historyList">
                <p style="color: #999;">No predictions yet</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://noshow-prediction-api.onrender.com';
        let predictionHistory = [];
        
        // Check API status on load
        async function checkApiStatus() {
            try {
                const response = await fetch(`${API_URL}/`);
                if (response.ok) {
                    document.getElementById('apiStatus').textContent = '? API Online';
                    document.getElementById('apiStatus').className = 'api-status online';
                } else {
                    throw new Error('API not responding');
                }
            } catch (error) {
                document.getElementById('apiStatus').textContent = '? API Offline';
                document.getElementById('apiStatus').className = 'api-status offline';
            }
        }
        
        checkApiStatus();
        
        // Set default date to tomorrow
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('appointmentDate').value = tomorrow.toISOString().split('T')[0];
        
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('resultContainer');
            
            submitBtn.disabled = true;
            loading.style.display = 'block';
            resultContainer.innerHTML = '';
            
            const data = {
                contact_email: document.getElementById('email').value,
                appointment_date: document.getElementById('appointmentDate').value,
                appointment_value: parseFloat(document.getElementById('appointmentValue').value),
                is_new_patient: document.getElementById('isNewPatient').value === 'true',
                previous_no_shows: parseInt(document.getElementById('previousNoShows').value),
                lead_time_days: parseInt(document.getElementById('leadTime').value),
                days_since_scheduled: 1
            };
            
            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                displayResult(result);
                addToHistory(result);
                
            } catch (error) {
                resultContainer.innerHTML = `
                    <div class="result high">
                        <h3>? Error</h3>
                        <p>${error.message}</p>
                        <p>Make sure the API is running at ${API_URL}</p>
                    </div>
                `;
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
        
        function displayResult(result) {
            const container = document.getElementById('resultContainer');
            const riskClass = result.risk_level.toLowerCase();
            const circumference = 2 * Math.PI * 60;
            const offset = circumference - (result.no_show_probability / 100) * circumference;
            
            container.innerHTML = `
                <div class="result ${riskClass}">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <span class="risk-badge ${riskClass}">${result.risk_level} RISK</span>
                    </div>
                    
                    <div class="probability-circle">
                        <svg width="150" height="150">
                            <circle cx="75" cy="75" r="60" fill="none" stroke="#e0e0e0" stroke-width="10"/>
                            <circle cx="75" cy="75" r="60" fill="none" stroke="${getColor(result.risk_level)}" 
                                    stroke-width="10" stroke-dasharray="${circumference}" 
                                    stroke-dashoffset="${offset}" stroke-linecap="round"/>
                        </svg>
                        <div class="probability-text">${result.no_show_probability}%</div>
                    </div>
                    
                    <div class="metric">
                        <span class="metric-label">Revenue at Risk:</span>
                        <span class="metric-value">$${result.revenue_at_risk.toFixed(2)}</span>
                    </div>
                    
                    <div class="metric">
                        <span class="metric-label">Recommendation:</span>
                        <span class="metric-value">${result.recommendation || getRecommendation(result.risk_level)}</span>
                    </div>
                </div>
            `;
        }
        
        function getColor(riskLevel) {
            switch(riskLevel) {
                case 'HIGH': return '#e74c3c';
                case 'MEDIUM': return '#f39c12';
                case 'LOW': return '#27ae60';
                default: return '#667eea';
            }
        }
        
        function getRecommendation(riskLevel) {
            switch(riskLevel) {
                case 'HIGH': return 'URGENT: Call to confirm + offer reschedule';
                case 'MEDIUM': return 'Send SMS reminder 24hrs + email 48hrs before';
                case 'LOW': return 'Standard email reminder';
                default: return 'Monitor as usual';
            }
        }
        
        function addToHistory(result) {
            predictionHistory.unshift({
                ...result,
                timestamp: new Date().toLocaleString()
            });
            
            const historyList = document.getElementById('historyList');
            
            if (predictionHistory.length === 1) {
                historyList.innerHTML = '';
            }
            
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <strong>${result.contact_email}</strong> - 
                <span class="risk-badge ${result.risk_level.toLowerCase()}">${result.risk_level}</span>
                <div style="margin-top: 5px; color: #666; font-size: 0.9em;">
                    ${result.no_show_probability}% probability | $${result.revenue_at_risk.toFixed(2)} at risk
                </div>
            `;
            
            historyList.insertBefore(item, historyList.firstChild);
            
            // Keep only last 5
            while (historyList.children.length > 5) {
                historyList.removeChild(historyList.lastChild);
            }
        }
    </script>
</body>
</html>
