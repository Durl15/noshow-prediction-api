services:
  - type: web
    name: noshow-prediction-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: noshow_db
          property: connectionString
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: noshow_db
    databaseName: noshow_prediction
    user: noshow_user
    plan: free
