<!DOCTYPE html>
<html>
<head>
    <title>Test Branding</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/djai-brand.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <strong>DJ AI</strong><span style="color: #d4af37;">Consulting</span>
            </a>
        </div>
    </nav>
    
    <div class="container my-4">
        <div class="stat-card" style="max-width: 300px;">
            <div class="stat-number">85%</div>
            <div class="stat-label">Accuracy</div>
        </div>
        
        <button class="btn btn-primary mt-3">Primary Button</button>
        <button class="btn btn-secondary mt-3">Gold Button</button>
        
        <div class="mt-3">
            <span class="risk-high">High Risk</span>
            <span class="risk-medium">Medium</span>
            <span class="risk-low">Low Risk</span>
        </div>
    </div>
    
    <footer class="footer">
        <div class="container text-center">
            <strong>DJ AI</strong><span style="color: #d4af37;">Consulting</span>
        </div>
    </footer>
</body>
</html>
